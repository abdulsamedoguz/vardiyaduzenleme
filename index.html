<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vardiya Planlama - Giriş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
    <div class="card shadow-lg" style="width: 400px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-calendar3 display-3 text-primary"></i>
                <h3 class="mt-2">Vardiya Planlama</h3>
                <p class="text-muted">Sisteme giriş yapın</p>
            </div>

            <div id="setupSection" class="d-none">
                <p class="text-info small"><i class="bi bi-info-circle"></i> İlk kullanım: Şifre belirleyin</p>
                <div class="mb-3">
                    <input type="password" id="newPassword" class="form-control" placeholder="Yeni şifre">
                </div>
                <div class="mb-3">
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Şifre tekrar">
                </div>
                <button id="btnSetup" class="btn btn-primary w-100">Şifre Belirle</button>
            </div>

            <div id="loginSection" class="d-none">
                <div class="mb-3">
                    <input type="password" id="loginPassword" class="form-control" placeholder="Şifre" autofocus>
                </div>
                <button id="btnLogin" class="btn btn-primary w-100">Giriş Yap</button>
            </div>

            <div id="alertBox" class="alert mt-3 d-none" role="alert"></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
